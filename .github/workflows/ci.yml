name: Go CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ['1.25.0', 'stable']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: ${{ matrix.go-version == 'stable' }}

      - name: Display Go version
        run: go version

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test -cover -covermode atomic -race ./...
